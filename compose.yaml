services:
  postgres:
    image: postgres:16
    ports:
      # Dedicated host port; Langfuse PostgreSQL uses 15432 and is a separate stack.
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15433}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-agent_service}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-agent_service_toolkit}
    volumes:
      - agent_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agent_service} -d ${POSTGRES_DB:-agent_service_toolkit}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  agent_service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Generated locally by scripts/create_chroma_db.py and reused by RAG queries.
      - ./chroma_db:/app/chroma_db
      # Development-only credentials are ignored by Compose watch.
      - ./privatecredentials:/privatecredentials
    environment:
      # Use the dedicated Compose-network database when the service runs in Docker.
      - DATABASE_TYPE=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      # A service running in Docker cannot reach a host-side Langfuse via localhost.
      # Override this with LANGFUSE_DOCKER_URL when Langfuse runs elsewhere.
      - LANGFUSE_HOST=${LANGFUSE_DOCKER_URL:-http://host.docker.internal:3000}
      - LANGFUSE_BASE_URL=${LANGFUSE_DOCKER_URL:-http://host.docker.internal:3000}
      # Ollama runs on the host; use OLLAMA_EMBEDDING_DOCKER_URL to override.
      - OLLAMA_EMBEDDING_BASE_URL=${OLLAMA_EMBEDDING_DOCKER_URL:-http://host.docker.internal:11434}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/info"]
      interval: 5s
      timeout: 5s
      retries: 5
    develop:
      watch:
        - path: src/agents/
          action: sync+restart
          target: /app/agents/
        - path: src/schema/
          action: sync+restart
          target: /app/schema/
        - path: src/service/
          action: sync+restart
          target: /app/service/
        - path: src/core/
          action: sync+restart
          target: /app/core/
        - path: src/memory/
          action: sync+restart
          target: /app/memory/
  streamlit_app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "8501:8501"
    depends_on:
      - agent_service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - AGENT_URL=http://agent_service:8080
    develop:
      watch:
        - path: src/client/
          action: sync+restart
          target: /app/client/
        - path: src/schema/
          action: sync+restart
          target: /app/schema/
        - path: src/streamlit_app.py
          action: sync+restart
          target: /app/streamlit_app.py

volumes:
  agent_service_postgres_data:
